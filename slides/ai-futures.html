# Will your company exist in 5 years?

Note: Pause. Let the silence work. Look around the room.

----

<!-- .slide: data-background-gradient="linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)" -->

## Possible Futures with AI

*a semi-astrological essay for IT people and not only*

[Nikolai Ryzhikov](https://www.linkedin.com/in/nikolai-ryzhikov-586a6913/) · CTO, Health Samurai

Note: "To answer this, let me tell you a story about an industry that already faced exactly this question."

----

<!-- .slide: data-background-color="#1a1a2e" -->

# Electronics Middle Market Collapse

I see parallels in the history of IT and Electronics

In the 1920s-1960s, Electronics was a distributed cottage industry with tens of thousands of small and mid-sized businesses.

Then, the integrated circuit was invented in 1958. <!-- .element: class="fragment" -->

This made the production of electronics much more efficient and cheaper. <!-- .element: class="fragment" -->

As a result, the middle market of electronics **collapsed**. <!-- .element: class="fragment" -->

----

## The Golden Age: 1920s-1960s

- **~150** TV manufacturers in the US alone (early 1950s) <!-- .element: class="fragment" -->
- **~20,000** electronics repair shops <!-- .element: class="fragment" -->
- **~1,500** component distributors <!-- .element: class="fragment" -->
- **1.9M** workers in electronics manufacturing <!-- .element: class="fragment" -->
- **24,000** EE graduates/year at peak (1985) <!-- .element: class="fragment" -->

Note: Every town had radio repair, local electronics manufacturers. 170 postwar TV manufacturers documented by name.

----

<!-- .slide: data-background-color="#2d1117" -->

## After the Integrated Circuit

- Jobs lost: **1.9M → 1.0M** (-47%) <!-- .element: class="fragment" -->
- US global fab share: **42%** (1980) → **12%** (2020) <!-- .element: class="fragment" -->
- Fab cost: **$4M** (1970) → **$20B** (2020s) — a **5,000x** increase <!-- .element: class="fragment" -->
- US TV manufacturers: **150 → 0** <!-- .element: class="fragment" -->
- US DRAM producers: **14** (1970) → **3** (1986) <!-- .element: class="fragment" -->
- Intel DRAM share: **83%** (1974) → **1.3%** (1984) <!-- .element: class="fragment" -->

Note: By 1988, Zenith was the sole surviving US TV manufacturer. Then it died too.

----

## What Survived?

Niches too small or too demanding for mass production:

- Medical devices, aerospace, defense <!-- .element: class="fragment" -->
- Fabless design companies (Qualcomm, Nvidia, AMD) <!-- .element: class="fragment" -->
- Contract manufacturers for custom small runs <!-- .element: class="fragment" -->

A tiny fraction of what existed before. <!-- .element: class="fragment" -->

----

## What Happened to the Jobs?

No need in routine work! Still need R&D, but not in the same quantity.

The survivors spend **21-28% of revenue on R&D** <!-- .element: class="fragment" -->

(Intel: 28%, industry avg: 21.5% — highest of any industry except pharma) <!-- .element: class="fragment" -->

**34-35%** of semiconductor workforce is in R&D today <!-- .element: class="fragment" -->

Note: The routine work disappeared. Surviving companies need a far higher density of genuinely innovative engineers.

----

<!-- .slide: data-background-color="#1a1a2e" -->

# Let's Interpolate This to IT

----

## How Many IT Jobs Are There Now?

## ~50-60M <!-- .element: class="fragment" -->

software developers worldwide (SlashData, 2025) <!-- .element: class="fragment" -->

**$1.6 Trillion** global IT services market <!-- .element: class="fragment" -->

**15,000+** firms doing platform customization globally <!-- .element: class="fragment" -->

----

## How Much of These Jobs Are Routine?

- **80-90%** right now <!-- .element: class="fragment" -->
- McKinsey: **57%** of US work hours already automatable <!-- .element: class="fragment" -->
- **10-20%** is genuinely creative work <!-- .element: class="fragment" -->

The rest is pattern-matching. And that's exactly what LLMs do. <!-- .element: class="fragment" -->

----

## What Is a Software Factory?

We already saw **platforms wave one**: clouds, CRM, ERP, ecom, etc.

**~32%** of IT services is just configuration and customization of platforms. <!-- .element: class="fragment" -->

AI already automates this work: <!-- .element: class="fragment" -->
- Salesforce Agentforce: **-40%** cost <!-- .element: class="fragment" -->
- SAP Joule: **-50%** design iterations <!-- .element: class="fragment" -->
- Gartner: **75%** of new apps will be low-code by 2026 <!-- .element: class="fragment" -->

Formula: **Platform + AI = no middle market** <!-- .element: class="fragment" -->

Note: 84% of enterprises already adopted low-code. The platforms are eating their own partners.

----

## The Outsourcing Parallel

Selling **routine intelligence by the hour**:

- India: **5.8M** IT workers, **$283B** revenue <!-- .element: class="fragment" -->
- Ukraine: **300K+** IT specialists <!-- .element: class="fragment" -->
- Upwork: **18M** freelancers <!-- .element: class="fragment" -->

cheap hands → cheap components → **cheap AI** <!-- .element: class="fragment" -->

Note: Fiverr cut 30% of staff to become "AI-first". The signal is clear.

----

<!-- .slide: data-background-color="#2d1117" -->

## The Disruption Is Already Here

| | |
|---|---|
| **-67%** Entry-level dev jobs since 2022 | **245K** Tech layoffs in 2025 |
| **57%** US work hours automatable | **44%** hiring managers expect AI layoffs |

Fiverr cut 30% of staff. Oracle cut 30,000. <!-- .element: class="fragment" -->

Note: Companies that hired 5 juniors now hire 2 mid-level engineers with AI tools for same output.

----

## What Can We Learn from Electronics?

Production of something like TV was monopolized by a few companies.

The same will happen with **routine software**: CRM, ERP, ecom, HR. <!-- .element: class="fragment" -->

The barrier is rising: training a frontier model costs **$1B+** <!-- .element: class="fragment" -->

Your 50-person Salesforce shop cannot build this infrastructure. <!-- .element: class="fragment" -->

----

## Will All Current Platforms Survive?

History of IBM: **probably not**.

There is a quick opportunity to build a **new platform for the post-AI era**. <!-- .element: class="fragment" -->

Salesforce, SAP, Oracle — built for a world where customization was expensive. <!-- .element: class="fragment" -->

AI-native apps could deliver the same, cheaper and deeper. <!-- .element: class="fragment" -->

----

## Local LLMs vs Commercial Models

OpenAI, Anthropic took crazy bets on their models. They think they will be the only ones to provide intelligence and the power will scale.

But what if it doesn't? <!-- .element: class="fragment" -->

What if it reaches a logical **plateau**? <!-- .element: class="fragment" -->

DeepSeek matched frontier performance at a fraction of cost. <!-- .element: class="fragment" -->

Open weights models running locally — on your phone. <!-- .element: class="fragment" -->

The PC defeating the mainframe: not by matching power, but by being **cheap enough**. <!-- .element: class="fragment" -->

----

<!-- .slide: data-background-color="#0d2818" -->

# The Bright Side

When electronics collapsed, **computers and programming were born** — creating entirely new industries.

What is the computers/programming equivalent after AI disruption? <!-- .element: class="fragment" -->

----

## Democratization of Intelligence

**Expert intelligence** has always been expensive: legal counsel, financial analysis, medical diagnosis.

AI makes routine expert intelligence **cheap and universally accessible**. <!-- .element: class="fragment" -->

Just as mass production made cars available to ordinary people. <!-- .element: class="fragment" -->

----

## The YouTube Model

| TV (before) | YouTube (after) |
|---|---|
| Centralized | Millions of creators |
| Few networks controlled everything | on shared infrastructure |

AI does the same for software: <!-- .element: class="fragment" -->
- Healthcare admin → AI billing assistant <!-- .element: class="fragment" -->
- Lawyer → AI contract reviewer <!-- .element: class="fragment" -->
- Construction PM → AI project scheduling <!-- .element: class="fragment" -->

Solo creators can't beat Salesforce on general CRM. But they serve niches **better**. <!-- .element: class="fragment" -->

----

<!-- .slide: data-background-color="#1a1a2e" -->

# Multiple Possible Futures

*We cannot know the order*

----

## Three Disruptions in Motion

**A: IT Middle Market Collapse** <!-- .element: class="fragment" -->

90% of configuration shops become non-viable. Outsourcing dies.

**B: Platform Disruption** <!-- .element: class="fragment" -->

Salesforce, SAP, Oracle — the IBM mainframe moment.

**C: The Open Source Wildcard** <!-- .element: class="fragment" -->

Capable models on your phone. Intelligence becomes a commodity.

Note: We don't know which comes first. Maybe all three at once.

----

<!-- .slide: data-background-color="#2d1117" -->

## The direction is clear

The current distribution of economic activity in software **will not survive** the decade intact.

Note: Pause. Let it sink in.

----

<!-- .slide: data-background-gradient="linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)" -->

## The Window Is 2-5 Years

The businesses that survived the electronics collapse were the ones that pivoted **before** the market collapsed, not after.

**Build, don't configure.** <!-- .element: class="fragment" -->

Deep domain expertise is your moat. <!-- .element: class="fragment" -->

----
