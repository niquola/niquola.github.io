<!-- .slide: data-background-color="#1a1a2e" -->

# Electronics Middle Market Collapse

I see parallels in the history of IT and Electronics

----

## 1920s-1960s: The Golden Age

- **~150** TV manufacturers in the US
- **~20,000** electronics repair shops
- **~1,500** component distributors
- **1.9M** workers in electronics manufacturing

----

<!-- .slide: data-background-color="#2d1117" -->

## After the Integrated Circuit (1958)

- Jobs: **1.9M → 1.0M** (-47%)
- Fab cost: **$4M** (1970) → **$20B** (2020s) — **5,000x**
- US TV manufacturers: **150 → 0**
- US DRAM producers: **14 → 3**
- Intel DRAM share: **83% → 1.3%**
- US global fab share: **42% → 12%**

----

## What Survived?

- Medical devices, aerospace, defense
- Fabless design (Qualcomm, Nvidia, AMD)
- Contract manufacturers for custom runs

Survivors spend **21-28% of revenue on R&D**

----

<!-- .slide: data-background-color="#1a1a2e" -->

# Let's Interpolate This to IT

----

## IT Today

- **~50-60M** software developers worldwide
- **$1.6T** global IT services market
- **15K+** platform customization firms
- **~32%** of IT services is config & customization

----

## How Much Is Routine?

- **80-90%** of IT work is routine
- **57%** of US work hours automatable (McKinsey)
- **10-20%** is genuinely creative

The rest is pattern-matching. That's what LLMs do.

----

## Platform + AI = No Middle Market

AI already automates configuration:

- Salesforce Agentforce: **-40%** cost
- SAP Joule: **-50%** design iterations
- Gartner: **75%** of new apps low-code by 2026

----

## Outsourcing Is Next

- India: **5.8M** IT workers, **$283B** revenue
- Ukraine: **300K+** IT specialists
- Upwork: **18M** freelancers

cheap hands → cheap components → **cheap AI**

----

<!-- .slide: data-background-color="#2d1117" -->

## Already Happening

| | |
|---|---|
| **-67%** junior dev jobs since 2022 | **245K** tech layoffs in 2025 |
| **57%** work hours automatable | **44%** managers expect AI layoffs |

Fiverr cut 30%. Oracle cut 30,000.

----

## Barrier Is Rising

| Electronics | AI |
|---|---|
| Fab: **$100M+** | Frontier model: **$1B+** |

Your 50-person shop cannot build this.

----

## Will Current Platforms Survive?

History of IBM: **probably not**.

Salesforce, SAP, Oracle — built for expensive customization.

AI-native apps deliver the same, cheaper.

----

## Local LLMs vs Commercial Models

What if intelligence reaches a **plateau**?

DeepSeek matched frontier at a fraction of cost.

Open models on your phone.

PC defeating the mainframe: not by power, but by being **cheap enough**.

----

<!-- .slide: data-background-color="#0d2818" -->

# The Bright Side

When electronics collapsed, **computers were born**.

What's the equivalent after AI disruption?

----

## Democratization of Intelligence

Expert intelligence was always expensive: lawyers, analysts, doctors.

AI makes it **cheap and universal**.

Like mass production made cars available to everyone.

----

## The YouTube Model

| TV | YouTube |
|---|---|
| Centralized, few networks | Millions of creators on shared infra |

AI does this for software:
- Healthcare admin → AI billing
- Lawyer → AI contracts
- Construction PM → AI scheduling

----

<!-- .slide: data-background-color="#1a1a2e" -->

# Multiple Possible Futures

*We cannot know the order*

----

## Three Disruptions in Motion

**A: IT Middle Market Collapse**
90% of configuration shops become non-viable.

**B: Platform Disruption**
Salesforce, SAP — the IBM mainframe moment.

**C: Open Source Wildcard**
Models on your phone. Intelligence as commodity.

----

<!-- .slide: data-background-color="#2d1117" -->

## The direction is clear

The current distribution of economic activity in software **will not survive** the decade.

----

<!-- .slide: data-background-gradient="linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)" -->

## The Window Is 2-5 Years

The businesses that survived the electronics collapse pivoted **before** the market collapsed, not after.

**Build, don't configure.** Domain expertise is your moat.

----
